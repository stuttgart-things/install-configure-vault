---
name: linting
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    
  workflow_dispatch:
jobs:
  yaml-lint:
    name: Lint yaml files
    uses: stuttgart-things/github-workflow-templates/.github/workflows/call-yaml-lint.yaml@golang-1.24.0
    with:
      runs-on: ghr-install-configure-vault-in-cluster
      environment-name: k8s
      continue-error: true
      yamllint-version: 1
      lintprofile-path: .yamllint
      artifact-name: yaml-lint

  ansible-lint:
    name: Lint ansible code
    uses: stuttgart-things/github-workflow-templates/.github/workflows/call-ansible-lint.yaml@golang-1.24.0
    with:
      runs-on: ghr-install-configure-vault-in-cluster
      environment-name: k8s
      continue-error: true
      # ghcr, not eu.gcr.io: the Google Artifact Registry copy answers
      # "Unauthenticated request" to every pull, so the job container never
      # starts and ansible-lint does not run — masked by continue-error above.
      # 14.0.0 because ghcr carries no 9.x/10.x tag; it is the line the fleet
      # runs today and it lints clean in download-install-binary.
      ansible-image: ghcr.io/stuttgart-things/sthings-ansible:14.0.0
      playbook: tests/test.yml
    needs: yaml-lint
